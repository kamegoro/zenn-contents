name: lint

on:
  push:
    branches:
      - main
    paths:
      - "articles/**"
  pull_request:
    paths:
      - "articles/**"

jobs:
  textlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".node-version"
          cache: "npm"

      - run: npm ci

      - run: npm run lint
